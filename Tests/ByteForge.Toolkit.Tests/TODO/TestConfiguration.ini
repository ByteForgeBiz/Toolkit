# ================================================
# ByteForge.Toolkit Test Configuration
# File: TestConfiguration.ini
# Purpose: Database connection configuration for unit testing
# ================================================

[Data Source]
SelectedDB=TestUnitDB_IntegratedSecurity

# ================================================
# Test Database Configuration - Integrated Security (Recommended)
# ================================================
[TestUnitDB_IntegratedSecurity]
sType=SQLServer
sServer=(local)
sDatabaseName=TestUnitDB
bTrustedConnection=true
bEncrypt=false
iConnectionTimeout=30
iCommandTimeout=300
bAutoTrimStrings=true

# ================================================
# Test Database Configuration - SQL Authentication (Alternative)
# ================================================
[TestUnitDB_SqlAuth]
sType=SQLServer
sServer=(local)
sDatabaseName=TestUnitDB
# Note: You would need to encrypt these values using Encryptor.Default.Encrypt()
# and store them as esUser and esPass instead
sUser=ByteForgeTestUser
sPass=TestP@ssw0rd123!
bTrustedConnection=false
bEncrypt=false
iConnectionTimeout=30
iCommandTimeout=300
bAutoTrimStrings=true

# ================================================
# Performance Testing Database Configuration
# ================================================
[TestUnitDB_Performance]
sType=SQLServer
sServer=(local)
sDatabaseName=TestUnitDB
bTrustedConnection=true
bEncrypt=false
iConnectionTimeout=60
iCommandTimeout=600
bAutoTrimStrings=true

# ================================================
# Test ODBC Configuration (for ODBC testing)
# ================================================
[TestUnitDB_ODBC]
sType=ODBC
sServerDSN=TestUnitDB_DSN
sServer=(local)
sDatabaseName=TestUnitDB
# For ODBC, you might need to set up a System DSN named "TestUnitDB_DSN"
# or use a connection string directly
sConnectionString=Driver={ODBC Driver 17 for SQL Server};Server=(local);Database=TestUnitDB;Trusted_Connection=yes;

# ================================================
# Test Configuration with Direct Connection String
# ================================================
[TestUnitDB_DirectConnectionString]
sType=SQLServer
sConnectionString=Server=(local);Database=TestUnitDB;Integrated Security=true;Connect Timeout=30;Command Timeout=300;

# ================================================
# Error Testing Configuration (Invalid database)
# ================================================
[TestUnitDB_Invalid]
sType=SQLServer
sServer=(local)
sDatabaseName=NonExistentDatabase
bTrustedConnection=true
bEncrypt=false
iConnectionTimeout=5
iCommandTimeout=30
bAutoTrimStrings=true