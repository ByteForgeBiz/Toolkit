name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-2022
    env:
      CONFIGURATION: Release
      BYTEFORGE_TEST_SQL_INSTANCE: MSSQLLocalDB
      BYTEFORGE_TEST_SQL_SERVER: (localdb)\MSSQLLocalDB
      BYTEFORGE_TEST_SQL_DATABASE: TestUnitDB
      BYTEFORGE_TEST_LOG_DIR: ${{ github.workspace }}\artifacts\logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x

      - name: Show LocalDB details
        shell: pwsh
        run: |
          sqllocaldb info
          Get-Command sqlcmd

      - name: Create artifact directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:BYTEFORGE_TEST_LOG_DIR" | Out-Null
          New-Item -ItemType Directory -Force -Path "$PWD\TestResults\net9.0" | Out-Null
          New-Item -ItemType Directory -Force -Path "$PWD\TestResults\net48" | Out-Null

      - name: Detect Access ODBC driver
        id: odbc_probe
        shell: pwsh
        run: |
          $driverLogPath = Join-Path $env:BYTEFORGE_TEST_LOG_DIR 'odbc-drivers.txt'
          $drivers = @(Get-OdbcDriver | Sort-Object Name)
          if ($drivers.Count -gt 0) {
            $drivers | Format-Table Name, Platform, Attribute -AutoSize | Out-String | Set-Content -Path $driverLogPath
          }
          else {
            'No ODBC drivers reported by Get-OdbcDriver.' | Set-Content -Path $driverLogPath
          }

          $accessCapableDrivers = @(
            $drivers | Where-Object {
              $_.Name -match 'Access' -and
              ($_.Name -match '\.accdb' -or $_.Name -match 'ACE')
            }
          )

          $hasAccdbDriver = $accessCapableDrivers.Count -gt 0
          Add-Content -Path $driverLogPath -Value ''
          if ($hasAccdbDriver) {
            Add-Content -Path $driverLogPath -Value 'Detected .accdb-capable Access drivers:'
            $accessCapableDrivers | Format-Table Name, Platform, Attribute -AutoSize | Out-String | Add-Content -Path $driverLogPath
          }
          else {
            Add-Content -Path $driverLogPath -Value 'No .accdb-capable Access ODBC driver detected.'
          }

          "access_odbc_available=$($hasAccdbDriver.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if ($hasAccdbDriver) {
            Write-Host 'Access ODBC driver with .accdb support detected.'
          }
          else {
            Write-Warning 'No Access ODBC driver with .accdb support was found. ODBC-tagged tests will be skipped.'
          }

      - name: Bootstrap TestUnitDB
        shell: pwsh
        run: |
          .\.github\scripts\bootstrap-test-sql.ps1 `
            -InstanceName $env:BYTEFORGE_TEST_SQL_INSTANCE `
            -RepoRoot $PWD.Path

      - name: Restore solution
        shell: pwsh
        run: dotnet restore .\ByteForge.Toolkit.sln

      - name: Build solution
        shell: pwsh
        run: dotnet build .\ByteForge.Toolkit.sln --configuration $env:CONFIGURATION --no-restore

      - name: Test net9.0
        shell: pwsh
        env:
          ACCESS_ODBC_AVAILABLE: ${{ steps.odbc_probe.outputs.access_odbc_available }}
        run: |
          $args = @(
            'test',
            '.\Toolkit.Modern.Tests\ByteForge.Toolkit.Modern.Tests.csproj',
            '--configuration', $env:CONFIGURATION,
            '--framework', 'net9.0',
            '--no-build',
            '--results-directory', '.\TestResults\net9.0',
            '--logger', 'trx;LogFileName=net9.0.trx'
          )

          if ($env:ACCESS_ODBC_AVAILABLE -ne 'true') {
            $args += @('--filter', 'TestCategory!=ODBC')
          }

          & dotnet @args

      - name: Test net48
        shell: pwsh
        env:
          ACCESS_ODBC_AVAILABLE: ${{ steps.odbc_probe.outputs.access_odbc_available }}
        run: |
          $args = @(
            'test',
            '.\Toolkit.Modern.Tests\ByteForge.Toolkit.Modern.Tests.csproj',
            '--configuration', $env:CONFIGURATION,
            '--framework', 'net48',
            '--no-build',
            '--results-directory', '.\TestResults\net48',
            '--logger', 'trx;LogFileName=net48.trx'
          )

          if ($env:ACCESS_ODBC_AVAILABLE -ne 'true') {
            $args += @('--filter', 'TestCategory!=ODBC')
          }

          & dotnet @args

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          if-no-files-found: warn
          path: |
            ${{ github.workspace }}\TestResults
            ${{ github.workspace }}\artifacts\logs
