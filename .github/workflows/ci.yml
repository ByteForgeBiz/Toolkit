name: CI

on:
  push:
  pull_request:

# Cancel any in-progress run for the same branch when a new run is triggered.
# For push events:        github.head_ref is empty → falls back to github.ref_name (branch name).
# For pull_request events: github.head_ref is the source branch name.
# Both resolve to the same key, so opening a PR cancels the redundant push run.
concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-2022
    env:
      CONFIGURATION: Release
      BYTEFORGE_TEST_SQL_INSTANCE: MSSQLLocalDB
      BYTEFORGE_TEST_SQL_SERVER: (localdb)\MSSQLLocalDB
      BYTEFORGE_TEST_SQL_DATABASE: TestUnitDB
      BYTEFORGE_TEST_LOG_DIR: ${{ github.workspace }}\artifacts\logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x

      - name: Show LocalDB details
        shell: pwsh
        run: |
          sqllocaldb info
          Get-Command sqlcmd

      - name: Create artifact directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:BYTEFORGE_TEST_LOG_DIR" | Out-Null
          New-Item -ItemType Directory -Force -Path "$PWD\TestResults\net9.0" | Out-Null
          New-Item -ItemType Directory -Force -Path "$PWD\TestResults\net48" | Out-Null

      - name: Detect Access ODBC driver
        id: odbc_probe
        shell: pwsh
        run: |
          $driverLogPath = Join-Path $env:BYTEFORGE_TEST_LOG_DIR 'odbc-drivers.txt'
          $drivers = @(Get-OdbcDriver | Sort-Object Name)
          if ($drivers.Count -gt 0) {
            $drivers | Format-Table Name, Platform, Attribute -AutoSize | Out-String | Set-Content -Path $driverLogPath
          }
          else {
            'No ODBC drivers reported by Get-OdbcDriver.' | Set-Content -Path $driverLogPath
          }

          $selectedAccessFormat = 'none'
          $accessCapableDrivers = @(
            $drivers | Where-Object {
              $_.Name -match 'Access' -and
              ($_.Name -match '\.accdb' -or $_.Name -match 'ACE')
            }
          )
          $mdbCapableDrivers = @(
            $drivers | Where-Object {
              $_.Name -match 'Access' -and $_.Name -match '\.mdb'
            }
          )

          $hasAccdbDriver = $accessCapableDrivers.Count -gt 0
          $hasMdbDriver = $mdbCapableDrivers.Count -gt 0
          Add-Content -Path $driverLogPath -Value ''
          if ($hasAccdbDriver) {
            $selectedAccessFormat = 'accdb'
            Add-Content -Path $driverLogPath -Value 'Detected .accdb-capable Access drivers:'
            $accessCapableDrivers | Format-Table Name, Platform, Attribute -AutoSize | Out-String | Add-Content -Path $driverLogPath
          }
          elseif ($hasMdbDriver) {
            $selectedAccessFormat = 'mdb'
            Add-Content -Path $driverLogPath -Value 'Detected .mdb-capable Access drivers:'
            $mdbCapableDrivers | Format-Table Name, Platform, Attribute -AutoSize | Out-String | Add-Content -Path $driverLogPath
          }
          else {
            Add-Content -Path $driverLogPath -Value 'No .accdb-capable Access ODBC driver detected.'
          }

          "access_odbc_available=$(($selectedAccessFormat -ne 'none').ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "access_format=$selectedAccessFormat" >> $env:GITHUB_OUTPUT

          if ($hasAccdbDriver) {
            Write-Host 'Access ODBC driver with .accdb support detected.'
          }
          elseif ($hasMdbDriver) {
            Write-Warning 'Only legacy .mdb Access ODBC support was found. Tests will run against TestUnitDB.mdb.'
          }
          else {
            Write-Warning 'No Access ODBC driver with .accdb support was found. ODBC-tagged tests will be skipped.'
          }

      - name: Bootstrap TestUnitDB
        shell: pwsh
        run: |
          .\.github\scripts\bootstrap-test-sql.ps1 `
            -InstanceName $env:BYTEFORGE_TEST_SQL_INSTANCE `
            -RepoRoot $PWD.Path

      - name: Restore solution
        shell: pwsh
        run: dotnet restore .\ByteForge.Toolkit.sln

      - name: Build solution
        shell: pwsh
        run: dotnet build .\ByteForge.Toolkit.sln --configuration $env:CONFIGURATION --no-restore

      - name: Test net9.0
        shell: pwsh
        env:
          ACCESS_ODBC_AVAILABLE: ${{ steps.odbc_probe.outputs.access_odbc_available }}
          BYTEFORGE_TEST_ACCESS_FORMAT: ${{ steps.odbc_probe.outputs.access_format }}
        run: |
          $args = @(
            'test',
            '.\Toolkit.Modern.Tests\ByteForge.Toolkit.Modern.Tests.csproj',
            '--configuration', $env:CONFIGURATION,
            '--framework', 'net9.0',
            '--no-build',
            '--results-directory', '.\TestResults\net9.0',
            '--logger', 'trx;LogFileName=net9.0.trx'
          )

          $args += @('--filter', 'TestCategory!=ODBC')

          & dotnet @args

      - name: Test net48
        shell: pwsh
        env:
          BYTEFORGE_TEST_ACCESS_FORMAT: ${{ steps.odbc_probe.outputs.access_format }}
        run: |
          $args = @(
            'test',
            '.\Toolkit.Modern.Tests\ByteForge.Toolkit.Modern.Tests.csproj',
            '--configuration', $env:CONFIGURATION,
            '--framework', 'net48',
            '--no-build',
            '--results-directory', '.\TestResults\net48',
            '--logger', 'trx;LogFileName=net48.trx',
            '--filter', 'TestCategory!=ODBC'
          )

          & dotnet @args

      - name: Test net48 ODBC (x86)
        if: steps.odbc_probe.outputs.access_odbc_available == 'true'
        shell: pwsh
        env:
          BYTEFORGE_TEST_ACCESS_FORMAT: ${{ steps.odbc_probe.outputs.access_format }}
        run: |
          $args = @(
            'test',
            '.\Toolkit.Modern.Tests\ByteForge.Toolkit.Modern.Tests.csproj',
            '--configuration', $env:CONFIGURATION,
            '--framework', 'net48',
            '--no-build',
            '--results-directory', '.\TestResults\net48-odbc',
            '--logger', 'trx;LogFileName=net48-odbc.trx',
            '--filter', 'TestCategory=ODBC',
            '--',
            'RunConfiguration.TargetPlatform=x86'
          )

          & dotnet @args

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          if-no-files-found: warn
          path: |
            ${{ github.workspace }}\TestResults
            ${{ github.workspace }}\artifacts\logs
