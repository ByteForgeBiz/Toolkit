name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    env:
      CONFIGURATION: Release
      BYTEFORGE_TEST_SQL_INSTANCE: MSSQLLocalDB
      BYTEFORGE_TEST_SQL_SERVER: (localdb)\MSSQLLocalDB
      BYTEFORGE_TEST_SQL_DATABASE: TestUnitDB

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x

      - name: Show LocalDB details
        shell: pwsh
        run: |
          sqllocaldb info
          Get-Command sqlcmd

      - name: Bootstrap TestUnitDB
        shell: pwsh
        run: |
          .\.github\scripts\bootstrap-test-sql.ps1 `
            -InstanceName $env:BYTEFORGE_TEST_SQL_INSTANCE `
            -RepoRoot $PWD.Path

      - name: Restore solution
        shell: pwsh
        run: dotnet restore .\ByteForge.Toolkit.sln

      - name: Build solution
        shell: pwsh
        run: dotnet build .\ByteForge.Toolkit.sln --configuration $env:CONFIGURATION --no-restore

      - name: Test net9.0
        shell: pwsh
        run: dotnet test .\Toolkit.Modern.Tests\ByteForge.Toolkit.Modern.Tests.csproj --configuration $env:CONFIGURATION --framework net9.0 --no-build

      - name: Test net48
        shell: pwsh
        run: dotnet test .\Toolkit.Modern.Tests\ByteForge.Toolkit.Modern.Tests.csproj --configuration $env:CONFIGURATION --framework net48 --no-build
